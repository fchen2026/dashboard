<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>vis-network 8.5.4 最小测试</title></head>
<body style="margin:20px">
<h1>vis-network 8.5.4 测试</h1>
<div id="mynetwork" style="width:600px;height:400px;border:2px solid green"></div>
<div id="status" style="margin-top:20px;padding:10px;background:#f0f0f0"></div>
<script src="https://cdn.jsdelivr.net/npm/vis-network@8.5.4/standalone/umd/vis-network.min.js"></script>
<script>
var s = document.getElementById('status');
function log(msg, isErr) {
    s.innerHTML += '<p style="color:' + (isErr?'red':'green') + '">' + msg + '</p>';
}
try {
    log('vis type: ' + typeof vis);
    log('vis.Network: ' + typeof vis.Network);
    log('vis.DataSet: ' + typeof vis.DataSet);
    if (typeof vis === 'undefined' || typeof vis.Network === 'undefined') {
        log('ERROR: vis or vis.Network not available!', true);
    } else {
        // Try creating with simplest params
        log('Creating nodes/edges...');
        var nodes = new vis.DataSet([
            {id: 1, label: 'Node 1'},
            {id: 2, label: 'Node 2'}
        ]);
        var edges = new vis.DataSet([
            {from: 1, to: 2}
        ]);
        log('DataSet created. Nodes: ' + nodes.length + ', Edges: ' + edges.length);
        
        // Simple options
        var options = {
            physics: { enabled: true, solver: 'forceAtlas2Based' },
            interaction: { hover: true }
        };
        log('Creating vis.Network...');
        var network = new vis.Network(document.getElementById('mynetwork'), {nodes:nodes, edges:edges}, options);
        log('SUCCESS: vis.Network created!');
        document.title = 'SUCCESS';
        
        // Now try with our full options
        log('Testing full options...');
        setTimeout(function() {
            try {
                var network2 = new vis.Network(
                    document.getElementById('mynetwork'),
                    {nodes:nodes, edges:edges},
                    {
                        physics: {
                            enabled: true,
                            solver: 'forceAtlas2Based',
                            forceAtlas2Based: {
                                gravitationalConstant: -60,
                                centralGravity: 0.005,
                                springLength: 100,
                                springConstant: 0.08,
                                damping: 0.4
                            },
                            stabilization: { iterations: 200, updateInterval: 25 }
                        },
                        layout: { improvedLayout: true, hierarchical: false },
                        interaction: { hover: true, tooltipDelay: 100, zoomView: true, dragView: true, navigationButtons: false },
                        nodes: { borderWidthSelected: 3, shadow: { enabled: true, color: 'rgba(0,0,0,0.06)', size: 6 } },
                        edges: { smooth: { type: 'continuous' }, hoverWidth: 2 }
                    }
                );
                log('Full options SUCCESS!');
            } catch(e) {
                log('Full options FAILED: ' + e.message, true);
                document.title = 'FULL-FAIL';
            }
        }, 2000);
    }
} catch(e) {
    log('ERROR: ' + e.message + ' | stack: ' + (e.stack||'none'), true);
    document.title = 'FAILED';
}
</script>
</body>
</html>
